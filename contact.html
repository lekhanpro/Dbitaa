<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | DBIT Alumni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header id="site-header"></header>
  <main>
    <section class="hero-bg py-28 text-white" style="background-image:url('assets/images/alumni-02.jpg')">
      <div class="max-w-5xl mx-auto px-4 text-center"><p class="text-[#f7c04d] font-extrabold uppercase tracking-[0.18em]">Contact</p><h1 class="text-4xl md:text-6xl font-black mt-4">Reach DBIT Alumni Association</h1></div>
    </section>
    <section class="py-16">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-3 gap-6 mb-10">
        <div class="card p-6"><h2 class="text-xl font-black text-[#0859a6]">Address</h2><p class="text-slate-600 mt-3">Don Bosco Institute of Technology, Kumbalagodu, Mysore Road, Bengaluru, Karnataka.</p></div>
        <div class="card p-6"><h2 class="text-xl font-black text-[#0859a6]">Phone</h2><p class="text-slate-600 mt-3">+91 80 2843 7028</p></div>
        <div class="card p-6"><h2 class="text-xl font-black text-[#0859a6]">Email</h2><p class="text-slate-600 mt-3">alumni@dbit.co.in</p></div>
      </div>
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-2 gap-8">
        <form class="card p-7 grid gap-5">
          <h2 class="text-3xl font-black text-[#0859a6]">Send a message</h2>
          <input class="form-input" required placeholder="Name">
          <input class="form-input" type="email" required placeholder="Email">
          <input class="form-input" required placeholder="Subject">
          <textarea class="form-input min-h-40" required placeholder="Message"></textarea>
          <button class="px-6 py-3 rounded-full btn-primary font-bold w-fit" type="submit">Send</button>
        </form>
        <div class="card overflow-hidden min-h-[430px]">
          <iframe title="DBIT Bengaluru map" class="w-full h-full min-h-[430px]" loading="lazy" src="https://www.google.com/maps?q=Don%20Bosco%20Institute%20of%20Technology%20Bangalore&output=embed"></iframe>
        </div>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
</body>
</html>
