<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | DBIT Alumni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/images/alumni-01.png">
  <script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header id="site-header"></header>
  <main>
    <section class="hero-bg py-28 text-white" style="background-image:url('assets/images/source/source-007.jpeg')">
      <div class="max-w-5xl mx-auto px-4 text-center"><p class="text-[#f7c04d] font-extrabold uppercase tracking-[0.18em]">Gallery</p><h1 class="text-4xl md:text-6xl font-black mt-4">Photos and videos from DBIT alumni life</h1></div>
    </section>
    <section class="py-16">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5 mb-8">
          <div class="flex gap-3">
            <button data-gallery-tab="photos" class="px-5 py-3 rounded-full bg-[#0859a6] text-white font-bold">Photos</button>
            <button data-gallery-tab="videos" class="px-5 py-3 rounded-full bg-white text-[#0859a6] border font-bold">Videos</button>
          </div>
          <label class="md:w-96"><span class="sr-only">Filter gallery by event or year</span><input id="gallery-filter" class="form-input" type="search" placeholder="Filter by event name or year"></label>
        </div>
        <div data-gallery-panel="photos">
          <div id="photo-grid" class="masonry"></div>
        </div>
        <div data-gallery-panel="videos" class="hidden">
          <div id="video-grid" class="grid md:grid-cols-2 gap-6"></div>
        </div>
      </div>
    </section>
  </main>
  <div id="lightbox" class="lightbox" aria-modal="true" role="dialog">
    <button id="lightbox-close" class="absolute top-5 right-5 text-white text-4xl" aria-label="Close image lightbox">×</button>
    <img id="lightbox-image" src="" alt="">
  </div>
  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
