<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | DBIT Alumni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="css/custom.css">
</head>
<body>
  <header id="site-header"></header>
  <main class="min-h-[70vh] py-16 bg-slate-50 bg-cover bg-center" style="background-image:linear-gradient(rgba(246,248,251,0.86),rgba(246,248,251,0.92)),url('assets/images/alumni-02.jpg')">
    <div class="max-w-md mx-auto px-4">
      <div class="card p-8">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-black text-[#0859a6]">Alumni Login</h1>
          <p class="text-slate-600 mt-2">Access your DBIT alumni profile and events.</p>
        </div>
        <form class="grid gap-5">
          <label><span class="font-bold text-sm">Email</span><input class="form-input mt-2" type="email" required placeholder="you@example.com"></label>
          <label><span class="font-bold text-sm">Password</span><input class="form-input mt-2" type="password" required placeholder="Password"></label>
          <div class="flex justify-between text-sm"><label><input type="checkbox"> Remember me</label><a href="contact.html" class="font-bold text-[#0859a6]">Forgot Password?</a></div>
          <button type="submit" class="px-6 py-3 rounded-full btn-primary font-bold">Login</button>
        </form>
        <div class="my-6 flex items-center gap-3"><span class="h-px bg-slate-200 flex-1"></span><span class="text-sm text-slate-500">or</span><span class="h-px bg-slate-200 flex-1"></span></div>
        <div class="grid gap-3">
          <button class="px-5 py-3 rounded-xl border font-bold hover:bg-slate-50" aria-label="Login with Google">Continue with Google</button>
          <button class="px-5 py-3 rounded-xl border font-bold hover:bg-slate-50" aria-label="Login with LinkedIn">Continue with LinkedIn</button>
        </div>
        <p class="text-center mt-6 text-sm">New here? <a class="font-extrabold text-[#0859a6]" href="register.html">Register as Alumni</a></p>
      </div>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="js/main.js"></script>
</body>
</html>
